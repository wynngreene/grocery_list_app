<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Grocery App Starter</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="h3 mb-1">Weekly Grocery App</h1>
        <p class="text-muted mb-0">Lightweight starter prototype</p>
      </div>
      <button class="btn btn-primary" id="generateListBtn">Generate Grocery List</button>
    </div>

    <ul class="nav nav-pills mb-3" id="appTabs">
      <li class="nav-item">
        <button class="nav-link active" data-view="weekView">Week Menu</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-view="editView">Edit Meal</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-view="groceryView">Grocery List</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-view="ingredientsView">All Ingredients</button>
      </li>
    </ul>

    <section id="weekView" class="view-section">
      <div class="card section-card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <h2 class="h5 mb-1">Current Week Menu</h2>
              <p class="text-muted mb-0">Up to 6 meals for the week</p>
            </div>
            <span class="badge text-bg-light" id="weekMealCount">0 / 6 meals</span>
          </div>
          <div class="row g-3" id="weekMealsGrid"></div>
        </div>
      </div>
    </section>

    <section id="editView" class="view-section d-none">
      <div class="card section-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h2 class="h5 mb-1">Edit Meal</h2>
              <p class="text-muted mb-0">Basic starter editor with ingredient suggestions</p>
            </div>
          </div>

          <form id="mealForm" novalidate>
            <div class="row g-3">
              <div class="col-12 col-md-3">
                <label class="form-label">Meal Image</label>
                <div>
                  <img id="mealPreview" class="meal-thumb" src="https://placehold.co/100x100?text=Meal" alt="Meal preview" />
                </div>
              </div>

              <div class="col-12 col-md-9">
                <div class="mb-3">
                  <label for="mealTitle" class="form-label">Title</label>
                  <input id="mealTitle" class="form-control" type="text" />
                </div>
                <div class="mb-3">
                  <label for="mealDescription" class="form-label">Description</label>
                  <textarea id="mealDescription" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="mealFavorite" />
                  <label class="form-check-label" for="mealFavorite">Favorite meal</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="mealActive" />
                  <label class="form-check-label" for="mealActive">Active meal</label>
                </div>
              </div>
            </div>

            <hr class="my-4" />

            <div class="d-flex justify-content-between align-items-center mb-2">
              <div>
                <h3 class="h6 mb-0">Ingredients</h3>
              </div>
              <button class="btn btn-sm btn-outline-primary" type="button" id="addIngredientBtn">Add Ingredient</button>
            </div>

            <div id="ingredientEditorList"></div>

            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-success" type="submit">Save Meal</button>
              <button class="btn btn-outline-secondary" type="button" id="resetEditorBtn">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section id="groceryView" class="view-section d-none">
      <div class="card section-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h2 class="h5 mb-1">Weekly Grocery List</h2>
              <p class="text-muted mb-0">Grouped by ingredient type</p>
            </div>
          </div>
          <div id="groceryGroups"></div>
        </div>
      </div>
    </section>

    <section id="ingredientsView" class="view-section d-none">
      <div class="card section-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h2 class="h5 mb-1">All Ingredients</h2>
              <p class="text-muted mb-0">Master ingredient library with duplicate hints</p>
            </div>
          </div>
          <div id="allIngredientsList"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
